<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Janiya Buty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-primary-light antialiased">
    <!-- Navigation -->
    <nav class="fixed w-full z-50 transition-all duration-300 bg-transparent py-4 text-dark flex items-center min-h-[5rem]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
            <div class="flex justify-between items-center">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="font-serif text-2xl font-bold tracking-widest text-[#d4af37]">JANIYA <span class="text-[#222]">BUTY</span></a>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="index.html" class="text-sm uppercase tracking-wider font-semibold hover:text-[#d4af37] transition">Home</a>
                    <a href="products.html" class="text-sm uppercase tracking-wider font-semibold hover:text-[#d4af37] transition">Shop</a>
                    <a href="about.html" class="text-sm uppercase tracking-wider font-semibold hover:text-[#d4af37] transition">About</a>
                    <a href="contact.html" class="text-sm uppercase tracking-wider font-semibold hover:text-[#d4af37] transition">Contact</a>
                    <a href="products.html" class="px-6 py-2 btn-primary rounded-none uppercase text-xs tracking-widest font-semibold flex items-center space-x-2">
                        <span>Cart (0)</span>
                    </a>
                </div>
                <!-- Mobile button -->
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-100 absolute w-full shadow-lg left-0 top-20">
            <div class="px-4 pt-4 pb-6 space-y-4 flex flex-col items-center">
                <a href="index.html" class="block text-sm uppercase tracking-wider font-semibold hover:text-[#d4af37]">Home</a>
                <a href="products.html" class="block text-sm uppercase tracking-wider font-semibold hover:text-[#d4af37]">Shop</a>
                <a href="about.html" class="block text-sm uppercase tracking-wider font-semibold hover:text-[#d4af37]">About</a>
                <a href="contact.html" class="block text-sm uppercase tracking-wider font-semibold hover:text-[#d4af37]">Contact</a>
            </div>
        </div>
    </nav>
    
    <header class="pt-32 pb-12 text-center fade-in bg-rose-gradient">
        <h1 class="text-4xl md:text-5xl font-serif font-bold text-[#222]">Get in Touch</h1>
        <p class="mt-4 text-gray-500 font-light max-w-lg mx-auto">Have questions about your skincare routine? Our beauty experts are here to help.</p>
    </header>

    <section class="max-w-4xl mx-auto px-4 pb-24 -mt-8 relative z-10">
        <div class="glass-card p-10 md:p-16 fade-in shadow-xl bg-white rounded-md">
            <form class="space-y-8" onsubmit="event.preventDefault(); alert('Thank you! We will contact you soon.');">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">First Name</label>
                        <input type="text" class="w-full border-b border-gray-300 bg-transparent py-3 focus:outline-none focus:border-[#d4af37] transition text-[#222]" required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Last Name</label>
                        <input type="text" class="w-full border-b border-gray-300 bg-transparent py-3 focus:outline-none focus:border-[#d4af37] transition text-[#222]" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Email Address</label>
                    <input type="email" class="w-full border-b border-gray-300 bg-transparent py-3 focus:outline-none focus:border-[#d4af37] transition text-[#222]" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Message</label>
                    <textarea rows="4" class="w-full border-b border-gray-300 bg-transparent py-3 focus:outline-none focus:border-[#d4af37] transition text-[#222] resize-none" required></textarea>
                </div>
                <div class="pt-4 text-center md:text-left">
                    <button type="submit" class="px-10 py-4 btn-primary w-full md:w-auto text-sm uppercase tracking-widest font-semibold rounded-sm">Send Message</button>
                </div>
            </form>
        </div>
    </section>
    
    <!-- Footer -->
    <footer class="bg-white py-12 border-t border-gray-100 px-4 mt-12">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="mb-6 md:mb-0">
                <a href="index.html" class="font-serif text-2xl font-bold tracking-widest text-[#d4af37]">JANIYA <span class="text-[#222]">BUTY</span></a>
            </div>
            <p class="text-xs text-gray-500 mt-6 md:mt-0 uppercase tracking-widest">&copy; 2026 Janiya Buty. All Rights Reserved.</p>
        </div>
    </footer>
    <script src="assets/js/main.js"></script>
</body>
</html>
